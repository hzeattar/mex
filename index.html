<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e1a">
  <title>MEX Trading Platform</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { background: #0a0e1a; color: white; font-family: system-ui, -apple-system, sans-serif; }
    .price-up { color: #10b981; }
    .price-down { color: #ef4444; }
    .skeleton { 
      background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .bg-dark-900 { background-color: #0a0e1a; }
    .bg-dark-800 { background-color: #111827; }
    .bg-dark-700 { background-color: #1f2937; }
    .border-dark-600 { border-color: #374151; }
    .text-primary-500 { color: #3b82f6; }
  </style>
</head>
<body class="bg-dark-900">
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const API_URL = '/api';

    // Header Component
    function Header() {
      return (
        <header className="bg-dark-800 border-b border-dark-600 sticky top-0 z-50">
          <div className="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold">M</div>
              <span className="font-bold text-lg">MEX Trading</span>
            </div>
            <div className="text-sm text-gray-400">Live Trading Platform</div>
          </div>
        </header>
      );
    }

    // Markets Component
    function Markets() {
      const [markets, setMarkets] = useState([]);
      const [type, setType] = useState('crypto');
      const [loading, setLoading] = useState(true);
      const types = ['crypto', 'forex', 'stocks', 'commodities', 'arab', 'futures'];

      useEffect(() => {
        setLoading(true);
        fetch(`${API_URL}/prices.php?type=${type}`)
          .then(r => r.json())
          .then(data => {
            if (data.ok) setMarkets(data.items);
            setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [type]);

      return (
        <div className="max-w-7xl mx-auto px-4 py-6">
          <h1 className="text-2xl font-bold mb-6">Markets</h1>
          
          <div className="flex gap-2 mb-6 overflow-x-auto">
            {types.map(t => (
              <button
                key={t}
                onClick={() => setType(t)}
                className={`px-4 py-2 rounded-lg font-medium capitalize ${
                  type === t ? 'bg-blue-600 text-white' : 'bg-dark-800 text-gray-400'
                }`}
              >
                {t}
              </button>
            ))}
          </div>

          <div className="bg-dark-800 rounded-xl border border-dark-600">
            {loading ? (
              <div className="p-4 space-y-3">
                {[1,2,3,4,5].map(i => <div key={i} className="skeleton h-12 rounded"></div>)}
              </div>
            ) : (
              <div className="divide-y divide-dark-600">
                {markets.slice(0, 20).map(m => (
                  <div key={m.symbol} className="px-4 py-3 flex items-center justify-between">
                    <div>
                      <div className="font-medium">{m.symbol}</div>
                      <div className="text-sm text-gray-400">{m.type}</div>
                    </div>
                    <div className="text-right">
                      <div className="font-mono">
                        ${m.price > 0 ? m.price.toLocaleString(undefined, {maximumFractionDigits: 8}) : '-'}
                      </div>
                      <div className={m.change_pct >= 0 ? 'price-up' : 'price-down'}>
                        {m.change_pct >= 0 ? '+' : ''}{m.change_pct.toFixed(2)}%
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // Main App
    function App() {
      return (
        <div className="min-h-screen bg-dark-900">
          <Header />
          <Markets />
          
          <footer className="border-t border-dark-600 mt-12 py-6">
            <div className="max-w-7xl mx-auto px-4 text-center text-gray-400 text-sm">
              <p>MEX Trading Platform - Live Prices from Binance & Simulated Markets</p>
              <p className="mt-2">API: <a href="/api/prices.php?type=crypto" className="text-primary-500">/prices.php?type=crypto</a></p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
