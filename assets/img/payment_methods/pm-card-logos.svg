<svg xmlns="http://www.w3.org/2000/svg" width="220" height="140" viewBox="0 0 220 140" role="img" aria-label="Visa Mastercard Stripe">
  <defs>
    <linearGradient id="bg" x1="22" y1="8" x2="198" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1b2437"/>
      <stop offset=".54" stop-color="#070b14"/>
      <stop offset="1" stop-color="#02040a"/>
    </linearGradient>
    <linearGradient id="shine" x1="35" y1="21" x2="172" y2="109" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".95"/>
      <stop offset=".55" stop-color="#eaf2ff"/>
      <stop offset="1" stop-color="#b8c6df"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="10" flood-color="#000000" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="220" height="140" rx="28" fill="url(#bg)"/>
  <path d="M22 23c36-18 108-22 176 4" stroke="#ffffff" stroke-opacity=".09" stroke-width="2"/>

  <g filter="url(#shadow)" transform="rotate(-7 79 70)">
    <rect x="28" y="35" width="92" height="58" rx="14" fill="url(#shine)"/>
    <path d="M28 48h92v10H28z" fill="#1A1F71"/>
    <text x="74" y="78" fill="#1A1F71" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" font-style="italic" text-anchor="middle">VISA</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="82" y="51" width="94" height="59" rx="15" fill="#f8fafc"/>
    <circle cx="121" cy="81" r="19" fill="#EB001B"/>
    <circle cx="143" cy="81" r="19" fill="#F79E1B"/>
    <path d="M132 65.9a19 19 0 0 1 0 30.2 19 19 0 0 1 0-30.2z" fill="#FF5F00"/>
    <text x="132" y="104" fill="#20242d" font-family="Arial, Helvetica, sans-serif" font-size="8" font-weight="800" text-anchor="middle">mastercard</text>
  </g>

  <g filter="url(#shadow)" transform="rotate(6 154 42)">
    <rect x="119" y="21" width="72" height="39" rx="13" fill="#635BFF"/>
    <text x="155" y="46" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="900" text-anchor="middle">stripe</text>
  </g>
</svg>
